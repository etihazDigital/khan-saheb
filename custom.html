    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  color:white;
  font-family:Poppins,sans-serif;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#000;
  border-bottom:1px solid #222;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Playfair Display', serif;
  font-size:22px;
}

.logo img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:25px;
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  color:#ccc;
  text-decoration:none;
  transition:0.3s;
}

.nav-links a:hover{
  color:gold;
}

#cart-btn{
  background:gold;
  color:black;
  padding:10px 15px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

  .navbar{
    flex-direction:column;
    align-items:flex-start;
    padding:15px 20px;
  }

  .nav-right{
    width:100%;
    justify-content:space-between;
    margin-top:15px;
  }

  .nav-links{
    gap:12px;
  }

}
    body{
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
    }

    .custom-page{
      padding:20px;
    }

    .title{
      text-align:center;
      margin-bottom:40px;
    }

    .section{
      margin-bottom:50px;
    }

    .category{
      margin-top:30px;
    }

    .category h3{
      margin-bottom:20px;
    }

    .garment-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:20px;
    }

    .garment-card{
      background:#111;
      border:1px solid #222;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
    }

    .garment-card:hover{
      transform:translateY(-5px);
      border-color:gold;
    }

    .garment-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .garment-card p{
      text-align:center;
      padding:10px;
    }

    .color-palette{
  display:flex;
  gap:15px;
  margin-top:20px;
  flex-wrap:wrap;
}

.color-circle{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #333;
  cursor:pointer;
}

.white-color{
  border:2px solid #777;
}

.garment-card.active{
  border:2px solid gold;
}

.color-circle.active{
  border:2px solid gold;
  transform:scale(1.1);
}


.fabric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
  margin-top:20px;
}

.fabric-card{
  background:#111;
  border:1px solid #333;
  padding:20px;
  text-align:center;
  border-radius:8px;
}

.fabric-card.active{
  border:2px solid gold;
  transform:scale(1.03);
}


.image-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
  margin-top:20px;
}

.image-grid img{
  width:100%;
  height:180px;          /* FIXED HEIGHT */
  object-fit:cover;      /* IMPORTANT: stops stretching */
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.3s;
}

.image-grid img:hover{
  transform:scale(1.03);
}

.image-grid img.active{
  border:2px solid gold;
}


.measurement-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.measurement-box{
  display:flex;
  flex-direction:column;
}

.measurement-box label{
  margin-bottom:8px;
}

.measurement-box input{
  padding:12px;
  background:#111;
  border:1px solid #333;
  color:white;
  border-radius:6px;
}

.summary-box{
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  padding:20px;
}

.summary-box p{
  margin-bottom:15px;
  font-size:16px;
}

.checkout-btn{
  width:100%;
  padding:16px;
  background:gold;
  color:black;
  border:none;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  margin-top:20px;
  transition:0.3s;
}

.checkout-btn:hover{
  opacity:0.85;
}

function selectGarment(el){

  document.querySelectorAll(".garment-card").forEach(card=>{
    card.classList.remove("active");
  });

  el.classList.add("active");

  selectedGarment = el.querySelector("p").innerText;

document.getElementById("summaryGarment").innerText = selectedGarment;

showMeasurements(selectedGarment);

}

function showMeasurements(garment){

  let container = document.getElementById("measurementContainer");

  container.innerHTML = "";

  if(!measurements[garment]) return;

  measurements[garment].forEach(item => {

    let div = document.createElement("div");

    div.className = "measurement-box";

    div.innerHTML = `
      <label>${item}</label>
      <input type="text" placeholder="Enter ${item}">
    `;

    container.appendChild(div);

  });

}
function selectColor(el, color){

  document.querySelectorAll(".color-circle").forEach(c=>{
    c.classList.remove("active");
  });

  el.classList.add("active");

  selectedColor = color;
  document.getElementById("summaryColor").innerText = color;

  showFabricsForColor(color);
}

let selectedGarment = "";
let selectedColor = "";
let selectedFabric = "";
let selectedImage = "";

function selectFabric(el){

  document.querySelectorAll(".fabric-card").forEach(f=>{
    f.classList.remove("active");
  });

  el.classList.add("active");

  selectedFabric = el.innerText;
  document.getElementById("summaryFabric").innerText = selectedFabric;

  showFabricImages(selectedColor, selectedFabric);
}


function showFabricImages(color, fabric){

  let container = document.getElementById("imageContainer");

  container.innerHTML = "";

  if(!fabricImages[color] || !fabricImages[color][fabric]){
    return;
  }

  fabricImages[color][fabric].forEach(img => {

    let image = document.createElement("img");

    image.src = img;

    image.onclick = () => {

  document.querySelectorAll(".image-grid img").forEach(i=>{
    i.classList.remove("active");
  });

  image.classList.add("active");

  selectedImage = img;

};

    container.appendChild(image);

  });

}

function showFabricsForColor(color){

  const container = document.getElementById("fabricContainer");

  container.innerHTML = "";

  let fabrics = fabricMap[color];

  fabrics.forEach(fabric => {

    let div = document.createElement("div");
    div.className = "fabric-card";
    div.innerText = fabric;

    div.onclick = () => selectFabric(div);

    container.appendChild(div);

  });

}

function saveCustomOrder(){

  const measurementInputs = document.querySelectorAll(".measurement-box input");

  let measurementData = {};

  measurementInputs.forEach(input => {

    const label = input.previousElementSibling.innerText;

    measurementData[label] = input.value;

  });

  const customOrder = {
  garment: selectedGarment,
  color: selectedColor,
  fabric: selectedFabric,
  image: selectedImage,
  price: garmentPrices[selectedGarment],
  measurements: measurementData
};

  localStorage.setItem(
    "customOrder",
    JSON.stringify(customOrder)
  );

  window.location.href = "cart.html";

}


let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount(){

  let countBox = document.getElementById("cart-count");

  if(countBox){
    countBox.innerText = cart.length;
  }

}

updateCartCount();
